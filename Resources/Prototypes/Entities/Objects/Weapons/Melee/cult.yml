    - backStorage
  - type: Wieldable
  - type: IncreaseDamageOnWield
    damage:
      types:
        Piercing: 10
  - type: SolutionInjectOnEmbed
    transferAmount: 10
    solution: melee
  - type: UseDelay
  - type: Appearance

