- type: gameMap
  id: Kettle
  mapName: 'Kettle'
  mapPath: /Maps/_Funkystation/kettle.yml
  minPlayers: 45
  stations:
    Kettle:
      stationProto: StandardNanotrasenStation
      components:
        - type: StationNameSetup
          mapNameTemplate: '{0} Kettle {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: 'FS'
        - type: StationEmergencyShuttle
          emergencyShuttlePath: /Maps/Shuttles/emergency_courser.yml
        - type: StationJobs
          availableJobs:
            #service
            NanotrasenRepresentative: [ 1, 1 ]
            Magistrate : [ 1, 1 ]
            InternalAffairsAgent: [ 1, 1 ]
            Captain: [ 1, 1 ]
            HeadOfPersonnel: [ 1, 1 ]
            Bartender: [ 1, 2 ]
            Botanist: [ 3, 4 ]
            Chef: [ 2, 3 ]
            Janitor: [ 4, 4 ]
            Chaplain: [ 1, 1 ]
            Librarian: [ 1, 2 ]
            Lawyer: [ 2, 3 ]
            Zookeeper: [ 1, 1 ]
            ServiceWorker: [ 4, 4 ]
            #engineering
            ChiefEngineer: [ 1, 1 ]
            StationEngineer: [ 7, 9 ]
            TechnicalAssistant: [ 6, 6 ]
            #medical
            ChiefMedicalOfficer: [ 1, 1 ]
            Chemist: [ 2, 3 ]
            Paramedic: [ 2, 2 ]
            MedicalDoctor: [ 6, 8 ]
            MedicalIntern: [ 6, 6 ]
            #science
            ResearchDirector: [ 1, 1 ]
            Scientist: [ 6, 8 ]
            ResearchAssistant: [ 6, 6 ]
            Borg: [ 3, 4 ]
            #security
            HeadOfSecurity: [ 1, 1 ]
            Warden: [ 1, 1 ]
            Detective: [ 1, 1 ]
            SecurityOfficer: [ 6, 8 ]
            SecurityCadet: [ 6, 6 ]
            #supply
            Quartermaster: [ 1, 1 ]
            SalvageSpecialist: [ 3, 4 ]
            CargoTechnician: [ 6, 6 ]
            #civillian
            Passenger: [ -1, -1 ]
            Clown: [ 1, 2 ]
            Mime: [ 1, 2 ]
            Musician: [ 1, 2 ]
            StationAi: [ 1, 1 ]

        # Goobstation blob-config-start HUGE
