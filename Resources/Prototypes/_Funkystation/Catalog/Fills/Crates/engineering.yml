  description: A crate containing a basic hardsuit, rated for civilian use.
  components:
  - type: StorageFill
    contents:
      - id: ClothingOuterHardsuitBasic
      - id: NitrogenTankFilled
      - id: OxygenTankFilled

- type: entity
  id: CrateEngineeringHEV
