- type: entity
  parent: BaseStructure
  id: BasePlatform
  abstract: true
  name: platform
  description: Basic platform meant to provide a stable surface for stand on.
  components:
  - type: Sprite
    drawdepth: SmallObjects
    sprite: _Funkystation/Structures/Walls/platform.rsi
  - type: Icon
    sprite: _Funkystation/Structures/Walls/platform.rsi
  - type: Physics
    bodyType: Static
  - type: InteractionOutline
  - type: Climbable
  - type: RCDDeconstructable
    cost: 2
    delay: 2
    fx: EffectRCDDeconstruct2

- type: entity
  parent: BasePlatform
  id: Platform
  components:
  - type: Sprite
    state: side
  - type: Icon
    state: side
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,-0.25"
        density: 1000
        mask:
        - TableMask
        layer:
        - TableLayer

