# For mantles
- type: loadoutEffectGroup
  id: MasterHoS
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobHeadOfSecurity
      time: 72000 #20 hrs

# Jumpsuit
- type: loadout
  id: HeadofSecurityService
  equipment:
    jumpsuit: ClothingUniformJumpsuitHosBase
  groupBy: "service"

- type: loadout
  id: HeadofSecurityDress
  equipment:
    jumpsuit: ClothingUniformDressHosBase
  groupBy: "dress"

- type: loadout
  id: HeadofSecurityDressSkirt
  equipment:
    jumpsuit: ClothingUniformHosDressSkirtBase
  groupBy: "dress"

- type: loadout
  id: HeadofSecurityFormalSuit
  equipment:
    jumpsuit: ClothingUniformMessHosBase
  groupBy: "formal"

- type: loadout
  id: HeadofSecurityFormalDress
  equipment:
    jumpsuit: ClothingUniformMessHosDressBase
  groupBy: "formal"

# Head
- type: loadout
  id: HeadofSecurityHead
  equipment:
    head: ClothingHeadHatHoshat

- type: loadout
  id: HeadofSecurityBeret
  equipment:
    head: ClothingHeadHatBeretHoS

# Neck
- type: loadout
  id: HeadofSecurityCloak
  equipment:
    neck: ClothingNeckCloakHos

- type: loadout
  id: HeadofSecurityMantle
  equipment:
    neck: ClothingNeckMantleHOS
  effects:
  - !type:GroupLoadoutEffect
    proto: MasterHoS

- type: startingGear
  id: HeadofSecurityMantle
  equipment:
    neck: ClothingNeckMantleHOS

# OuterClothing
- type: loadout
  id: HeadofSecurityCoat
  equipment:
    outerClothing: ClothingOuterCoatHoSTrench

- type: loadout
  id: HeadofSecurityWinterCoat
  equipment:
    outerClothing: ClothingOuterWinterHoS

- type: loadout
  id: HeadofSecurityArmorVest
  equipment:
    outerClothing: ClothingOuterArmorBasic

- type: loadout
  id: HeadofSecurityArmorVestSlim
  equipment:
    outerClothing: ClothingOuterArmorBasicSlim
