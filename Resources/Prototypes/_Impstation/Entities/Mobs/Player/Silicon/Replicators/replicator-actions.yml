# these are HEAVILY based on the Bingle free-agent ghostrole from GoobStation, but reflavored and reprogrammed to make them more Robust (and less of a meme.)
# all credit for the core gameplay concepts and a lot of the core functionality of the code goes to the folks over at Goob, but I re-wrote enough of it to justify putting it in our filestructure.
# the original Bingle PR can be found here: https://github.com/Goob-Station/Goob-Station/pull/1519
- type: entity
  id: ActionReplicatorSpawnNest
  name: Manufacture Nest
  description: Create a new nest for your hive.
  components:
  - type: InstantAction
    itemIconStyle: NoItem
    icon: _Impstation/Interface/Actions/spawn_nest.png
    event: !type:ReplicatorSpawnNestActionEvent
    useDelay: 20

- type: entity
  id: ActionReplicatorUpgrade2
  name: Upgrade (Tier 2)
  description: Gather nanites. Gain manipulation.
  components:
  - type: InstantAction
    itemIconStyle: NoItem
    icon: _Impstation/Interface/Actions/replicator_level2.png
    event: !type:ReplicatorUpgrade2ActionEvent
    useDelay: 20

- type: entity
  id: ActionReplicatorUpgrade2Alt
  name: Upgrade (Tier 2 Alt)
  description: Gather nanites. Gain weaponary.
  components:
  - type: InstantAction
    itemIconStyle: NoItem
    icon: _Impstation/Interface/Actions/replicator_level2alt.png
    event: !type:ReplicatorUpgrade2AltActionEvent
    useDelay: 20

- type: entity
  id: ActionReplicatorUpgrade3
  name: Upgrade (Tier 3)
  description: Gather nanites. Become stronger.
  components:
  - type: InstantAction
    itemIconStyle: NoItem
    icon: _Impstation/Interface/Actions/replicator_level3.png
    event: !type:ReplicatorUpgrade3ActionEvent
    useDelay: 20

- type: entity
  id: ActionReplicatorStunRay
  name: Stun Ray
  description: Neutralize target to enable termination and consumption.
  components:
  - type: WorldTargetAction
    icon: { sprite: Objects/Weapons/Guns/Projectiles/projectiles_tg.rsi, state: omnilaser_flash } # todo: real sprite
    event: !type:ActionGunShootEvent
    priority: 2
    checkCanAccess: false
    range: 0
    itemIconStyle: BigAction

- type: entity
  categories: [ HideSpawnMenu ]
  id: ReplicatorStunRay
  name: replicator stun ray
  description: Neutralize target to enable termination and consumption.
  components:
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 3
    rechargeSound: /Audio/Weapons/Guns/MagIn/kinetic_reload.ogg
  - type: BasicEntityAmmoProvider
    proto: BulletEnergyTurretDisabler
    capacity: 1
    count: 1
  - type: Gun
    soundGunshot: /Audio/_Impstation/Weapons/Guns/Gunshots/stunprojector.ogg
    soundEmpty: null

- type: entity
  id: ActionReplicatorEnergyBolt
  name: Energy Bolt
  description: Terminate target to enable consumption.
  components:
  - type: WorldTargetAction
    icon: { sprite: Objects/Weapons/Guns/Projectiles/projectiles_tg.rsi, state: heavylaser_flash } # todo: real sprite
    event: !type:ActionGunShootEvent
    priority: 2
    checkCanAccess: false
    range: 0
    itemIconStyle: BigAction

- type: entity
  categories: [ HideSpawnMenu ]
  id: ReplicatorEnergyBolt
  name: replicator stun ray
  description: Neutralize target to enable termination and consumption.
  components:
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 3
    rechargeSound: /Audio/Weapons/Guns/MagIn/kinetic_reload.ogg
  - type: BasicEntityAmmoProvider
    proto: BulletEnergyGunMagnum
    capacity: 1
    count: 1
  - type: Gun
    soundGunshot: /Audio/_Impstation/Weapons/Guns/Gunshots/stunprojector.ogg
    soundEmpty: null
