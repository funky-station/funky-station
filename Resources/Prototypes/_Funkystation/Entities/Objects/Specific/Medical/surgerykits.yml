- type: entity
  name: surgery kit
  description: Basic, but professional kit. Contains basic necessities for surgery.
  parent: BaseStorageItem
  id: SurgeryKit
  components:
  - type: Sprite
    sprite: _Funkystation/Objects/Specific/Medical/surgerykits.rsi
    state: surgerykit
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,5,3
  - type: Item
    size: Ginormous
    sprite: _Funkystation/Objects/Specific/Medical/surgerykits.rsi
    heldPrefix: surgerykit
  - type: PhysicalComposition
    materialComposition:
      Plastic: 150

- type: entity
  name: field surgery kit
  description: "Interdyne's portable surgery solution."
  parent: [SurgeryKit, BaseSyndicateContraband]
  id: SurgeryKitSyndicate
  components:
  - type: Sprite
    state: surgerykitsyndicate
  - type: Item
    heldPrefix: surgerykitsyndicate

# Regular anodynafil jug is too large, so we'll just use a beverage jug instead. I mean, are you gonna use the whole 200 units anyway?
- type: entity
  parent: CustomDrinkJug
  suffix: anodynafil
  id: DrinkJugAnodynafil
  categories: [ HideSpawnMenu ]
  components:
  - type: Label
    currentLabel: reagent-name-anodynafil
  - type: SolutionContainerManager
    solutions:
      beaker:
        reagents:
        - ReagentId: Anodynafil
          Quantity: 150
