- type: startingGear
  id: StartingGearReplicator
  equipment:
    pocket1: PinpointerReplicatorUnremoveable
  inhand:
  - ReplicatorT1Weapon

- type: startingGear
  id: StartingGearReplicatorTools
  equipment:
    pocket1: PinpointerReplicatorUnremoveable
  inhand:
    - OmnitoolUnremoveable

- type: startingGear
  id: StartingGearReplicatorDefence
  equipment:
    pocket1: PinpointerReplicatorUnremoveable
  inhand:
  - ReplicatorT2AltMeleeWeapon

- type: startingGear
  id: StartingGearReplicatorWeapon
  inhand:
    - ReplicatorT3Weapon
  equipment:
    pocket1: PinpointerReplicatorUnremoveable

- type: entity
  id: ReplicatorT2AltMeleeWeapon
  parent: ReplicatorT3Weapon
  name: defender whip
  description: You are a weapon.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Impstation/Mobs/Replicator/replicator.rsi
    state: t2altmelee
  - type: MeleeWeapon
    attackRate: 1.2
    wideAnimationRotation: 180
    soundHit:
      collection: MetalThud
    animation: WeaponArcSlash
    damage:
      types:
        Slash: 8
        Shock: 4
        Structural: 15

- type: entity
  id: ReplicatorT3Weapon
  parent: BaseItem
  name: replicator arm
  description: You are a weapon.
  categories: [ HideSpawnMenu ]
  components:
  - type: Tag
    tags:
    - Pickaxe
  - type: Sprite
    sprite: _Impstation/Mobs/Replicator/replicator.rsi
    state: t3weapon
  - type: MeleeWeapon
    attackRate: 0.7
    wideAnimationRotation: 180
    soundHit:
      path: "/Audio/Effects/metal_slam4.ogg"
    animation: WeaponArcSlash
    damage:
      types:
        Blunt: 25
        Structural: 45
  - type: StaminaDamageOnHit
    damage: 10
  - type: Unremoveable
  - type: Prying
    pryPowered: true
    force: true
    speedModifier: 1
    useSound:
      path: /Audio/Items/crowbar.ogg

- type: entity
  id: ReplicatorT1Weapon
  parent: BaseItem
  name: drone stun prod
  description: You are a non-lethal weapon.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Impstation/Mobs/Replicator/replicator.rsi
    state: t1weapon
  - type: MeleeWeapon
    attackRate: 1
    wideAnimationRotation: 225
    wideAnimation: WeaponArcThrust
    soundHit:
      path: "/Audio/Items/wirecutter.ogg"
    animation: WeaponArcPunch
    damage:
      types:
        Blunt: 0
  - type: StaminaDamageOnHit
    damage: 20
  - type: Unremoveable

- type: entity
  parent: PinpointerBase
  id: PinpointerReplicator
  name: internal gyroscope
  suffix: ReplicatorNest
  description: Locates the Nest.
  components:
  - type: Sprite
    sprite: _Impstation/Objects/Devices/pinpointer.rsi
    layers:
    - sprite: _Impstation/Objects/Devices/pinpointer_replicator.rsi
      state: pinpointer-replicator
      map: ["enum.PinpointerLayers.Base"]
    - state: pinonnull
      map: ["enum.PinpointerLayers.Screen"]
      shader: unshaded
      visible: false
  - type: Icon
    sprite: _Impstation/Objects/Devices/pinpointer_replicator.rsi
    state: pinpointer-replicator
  - type: Pinpointer
    component: ReplicatorNest
    targetName: replicator nest
    activateImmediately: true

- type: entity
  parent: PinpointerReplicator
  id: PinpointerReplicatorUnremoveable
  categories: [HideSpawnMenu]
  components:
  - type: Unremoveable

- type: entity
  parent: AACTablet
  id: ReplicatorAAC
  name: verbal interface
  description: Communication.
  components:
  - type: AACTablet
    phraseGroup: ReplicatorPhrases
  - type: VoiceMask
  - type: Speech
    speechVerb: Robotic
    speechSounds: SyndieBorg
  - type: Sprite
    sprite: _Impstation/Mobs/Replicator/replicator_tablet.rsi
    state: aac_tablet
  - type: Item
  - type: Unremoveable

- type: inventoryTemplate
  id: replicator
  slots:
  - name: pocket1
    slotTexture: pocket
    fullTextureName: template_small
    slotFlags: POCKET
    slotGroup: MainHotbar
    stripTime: 3
    uiWindowPos: 0,3
    strippingWindowPos: 0,4
    displayName: Pocket 1
    stripHidden: true
