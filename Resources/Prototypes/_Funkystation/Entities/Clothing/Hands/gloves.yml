- type: entity
  parent: [ ClothingHandsGlovesColorBlack, BaseSecurityContraband ]
  id: ClothingHandsGlovesCombatSec
  name: security combat gloves
  description: These tactical gloves aren't built for insulation, but for riot control. The gloves have heavy knuckles built in for less lethally taking in targets. The weight of those hampers the hands from punching as fast as usual. Knock people down with these, save a life. Maybe. You never know.
  components:
  - type: Sprite
    sprite: _Funkystation/Clothing/Hands/Gloves/combat.rsi
  - type: Clothing
    sprite: _Funkystation/Clothing/Hands/Gloves/combat.rsi
  - type: Fiber
    fiberMaterial: fibers-black
  - type: MeleeWeapon
    attackRate: 0.5 #comedically not speedy since I don't exactly want this to be better than the baton for less lethal work, this is for the seccies who want to keep their arrest targets alive-er while still being worse than the baton
    damage:
      types:
        Blunt: 5
    bluntStaminaDamageFactor: 4 #throw hands lol 
    soundHit:
      collection: Punch
    animation: WeaponArcFist
    mustBeEquippedToUse: true
  - type: Tag
    tags:
    - WhitelistChameleon

- type: entity
  parent: [ ClothingHandsGlovesColorBlack, BaseCommandContraband ]
  id: ClothingHandsGlovesCombatHoS
  name: HoS's combat gloves
  description: These tactical gloves are fireproof, shock resistant, and have knuckles sewn specially into them, ensuring each punch hurts. Not exactly standard issue, but when push comes to shove, you'll win every engagement with these. Or so you tell yourself.
  components:
  - type: Sprite
    sprite: _Funkystation/Clothing/Hands/Gloves/combat.rsi
  - type: Clothing
    sprite: _Funkystation/Clothing/Hands/Gloves/combat.rsi
  - type: Insulated
  - type: Fiber
    fiberMaterial: fibers-insulative
  - type: MeleeWeapon
    attackRate: 1.5
    damage:
      types:
        Blunt: 12 #this literally be insuls+knuckles. Go ball, HoS.
    soundHit:
      collection: Punch
    animation: WeaponArcFist
    mustBeEquippedToUse: true
  - type: Tag
    tags:
    - WhitelistChameleon
