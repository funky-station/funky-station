- type: reagent
  id: MachineOil
  name: reagent-name-machine-oil
  group: Biological
  desc: reagent-desc-machine-oil
  flavor: terrible
  color: "#010101"
  recognizable: true
  physicalDesc: reagent-physical-desc-burnt
  metabolisms:
    Food:
      effects:
      - !type:SatiateHunger
        factor: -1
      - !type:SatiateThirst
        factor: -1
    Narcotic:
      effects:
      - !type:GenericStatusEffect
        key: SeeingRainbows
        component: SeeingRainbows
        type: Add
        time: 5
        refresh: false
  plantMetabolism:
  - !type:PlantAdjustToxins
    amount: 2
  - !type:PlantAdjustWeeds
    amount: -2
  - !type:PlantAdjustPests
    amount: -2
  footstepSound:
    collection: FootstepBlood
    params:
      volume: 6

- type: reagent
  id: NaniteSlurry
  name: reagent-name-nanite-slurry
  group: Biological
  desc: reagent-desc-nanite-slurry
  physicalDesc: reagent-physical-desc-robotic
  flavor: metallic
  color: "#960355"
  metabolisms:
    Poison:
      metabolismRate: 0.5
      effects:
      - !type:HealthChange
        damage:
          types:
            Shock: 1.2
      - !type:MovespeedModifier
        walkSpeedModifier: 0.5
        sprintSpeedModifier: 0.5
  footstepSound:
    collection: FootstepBlood
    params:
      volume: 6
