- type: entity
  id: BookCorporateSecrets
  parent: [BaseGuidebook, BaseCommandContraband]
  name: command training manual
  description: There's a big red stamp that says "CONFIDENTIAL" on it. Probably should keep this locked up.
  components:
  - type: Sprite
    sprite: _Funkystation/Objects/Misc/books.rsi
    layers:
    - state: corporate-secrets
  - type: GuideHelp
    guides:
    - CommandSOP
    - CommandTrainingManual
    - OrderOfSuccession

- type: entity
  id: BookSOP
  parent: BaseGuidebook
  name: A comprehensive collection of NanoTrasen Standard Operating Procedures
  description: Even looking at the title gives you a headache, you cannot bear looking at the size of the book.
  components:
  - type: Sprite
    layers:
    - state: paper
    - state: cover_base
      color: "#15abab"
    - state: decor_wingette
      color: "#5334e0"
    - state: icon_briefcase
  - type: MeleeWeapon
    wideAnimationRotation: 180
    attackRate: 0.10 # VERY slow attack speed so it cannot be used as an actual weapon but can still be used to bash the clown over the head
    damage:
      types:
        Blunt: 10
  - type: GuideHelp
    guides:
    - LegalSOP
    - MedicalSOP
    - ServiceSOP
    - EngineeringSOP
    - CargoSOP
    - ScienceSOP
    - CommandSOP # No idea why this was not in here before
    - OrderOfSuccession # I find that this counts as SOP, good for an IAA to have
    - SecuritySOP # Sec SOP
    - AlertLevelsSOP # All alert level SOPs
